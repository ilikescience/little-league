# Little League Light
# Generated from design tokens by the Little League build pipeline.
#
# Usage: save to ~/.config/starship.toml or source via STARSHIP_CONFIG

"$schema" = 'https://starship.rs/config-schema.json'

format = """
[ ](bg:#eeeeee)\
[ ](bg:#dddddd)\
[ ](bg:#bfbfc0)\
[ ](bg:#a4a4a5)\
$directory\
$git_branch\
$git_status\
$buf$bun$c$cmake$cobol$crystal$daml$dart$deno$dotnet$elixir$elm$erlang$fennel$gleam$golang$gradle$haskell$haxe$java$julia$kotlin$lua$meson$mojo$nim$nodejs$ocaml$odin$package$perl$php$purescript$python$quarto$rlang$red$ruby$rust$scala$solidity$swift$terraform$typst$vlang$zig\
$time\
\n$character"""

[directory]
style = "fg:#ffffff bg:#8c8c8d"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = ""
style = "bg:#bfbfc0"
format = '[[ $symbol$branch ](fg:#4d4d52 bg:#bfbfc0)]($style)'

[git_status]
style = "bg:#bfbfc0"
format = '[[($all_status$ahead_behind )](fg:#4d4d52 bg:#bfbfc0)]($style)'

[character]
format = "$symbol "
success_symbol = "[❯](fg:#ffffff)"
error_symbol = "[❯](red)"

[buf]
symbol = "buf "
style = "bg:#dddddd"
format = '[[ $symbol$version ](fg:#616164 bg:#dddddd)]($style)'

