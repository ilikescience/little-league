name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test
      - uses: actions/upload-artifact@v4
        with:
          name: theme-targets
          path: targets/

  publish-vscode:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: theme-targets
          path: targets/
      - run: npx @vscode/vsce publish --no-dependencies
        working-directory: targets/vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  github-release:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: theme-targets
          path: targets/
      - name: Package theme files
        run: |
          cd targets
          zip -r ../little-league-iterm.zip iterm/
          zip -r ../little-league-ghostty.zip ghostty/
          zip -r ../little-league-zed.zip zed/
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            little-league-iterm.zip
            little-league-ghostty.zip
            little-league-zed.zip
